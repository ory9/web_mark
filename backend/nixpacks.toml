[phases.setup]
nixPkgs = ["openssl"]

# Skip postinstall hooks during install so that @prisma/client's postinstall
# (which calls `prisma generate`) does NOT fire with whatever DATABASE_URL
# Railway may have injected from a linked service at build time.  We generate
# the client ourselves in the build phase below using a known-good placeholder.
[phases.install]
cmds = ["npm ci --ignore-scripts"]

# 1. Generate the Prisma client with a hardcoded placeholder URL.  The inline
#    assignment takes absolute precedence over any Railway service variable so
#    the P1012 "URL must start with postgresql://" error can never occur here.
#    (The same placeholder is kept in [variables] below as a runtime fallback;
#    the duplication is intentional – Railway service variables can override
#    [variables] at runtime but NOT an inline shell assignment at build time.)
# 2. Compile TypeScript.
[phases.build]
cmds = [
  "DATABASE_URL='postgresql://placeholder:placeholder@placeholder:5432/placeholder' npx prisma generate",
  "npm run build",
]

# Fallback env var visible at runtime only when the operator has not injected a
# real DATABASE_URL.  Railway's PostgreSQL service variable always overrides
# this at container start-up.
[variables]
DATABASE_URL = "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
